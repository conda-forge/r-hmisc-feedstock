{% set version = "5.2-6" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-hmisc
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/Hmisc_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/Hmisc/Hmisc_{{ version }}.tar.gz
  sha256: be0d8f946c48190c434a36707c984b025791c9c8874ce71e3bf872a2c951ba69

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}  # [build_platform != target_platform]
    - r-formula                  # [build_platform != target_platform]
    - r-base64enc                # [build_platform != target_platform]
    - r-cluster                  # [build_platform != target_platform]
    - r-colorspace               # [build_platform != target_platform]
    - r-data.table               # [build_platform != target_platform]
    - r-foreign                  # [build_platform != target_platform]
    - r-ggplot2                  # [build_platform != target_platform]
    - r-gridextra                # [build_platform != target_platform]
    - r-gtable                   # [build_platform != target_platform]
    - r-htmltable                # [build_platform != target_platform]
    - r-htmltools                # [build_platform != target_platform]
    - r-knitr                    # [build_platform != target_platform]
    - r-nnet                     # [build_platform != target_platform]
    - r-rmarkdown                # [build_platform != target_platform]
    - r-rpart                    # [build_platform != target_platform]
    - r-viridislite              # [build_platform != target_platform]
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('fortran') }}        # [not win]
    - {{ compiler('m2w64_fortran') }}  # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-formula
    - r-base64enc
    - r-cluster
    - r-colorspace
    - r-data.table
    - r-foreign
    - r-ggplot2
    - r-gridextra
    - r-gtable
    - r-htmltable >=1.11.0
    - r-htmltools
    - r-knitr
    - r-nnet
    - r-rmarkdown
    - r-rpart
    - r-viridislite
  run:
    - r-base
    - r-formula
    - r-base64enc
    - r-cluster
    - r-colorspace
    - r-data.table
    - r-foreign
    - r-ggplot2
    - r-gridextra
    - r-gtable
    - r-htmltable >=1.11.0
    - r-htmltools
    - r-knitr
    - r-nnet
    - r-rmarkdown
    - r-rpart
    - r-viridislite

test:
  commands:
    - $R -e "library('Hmisc')"           # [not win]
    - "\"%R%\" -e \"library('Hmisc')\""  # [win]

about:
  home: https://hbiostat.org/R/Hmisc/
  dev_url: https://github.com/harrelfe/Hmisc
  license: GPL-2.0-or-later
  summary: Contains many functions useful for data analysis, high-level graphics, utility operations,
    functions for computing sample size and power, simulation, importing and annotating
    datasets, imputing missing values, advanced table making, variable clustering, character
    string manipulation, conversion of R objects to LaTeX and html code, recoding variables,
    caching, simplified parallel computing, encrypting and decrypting data using a safe
    workflow, general moving window statistical estimation, and assistance in interpreting
    principal component analysis.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
